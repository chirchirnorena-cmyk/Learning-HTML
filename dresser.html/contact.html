    <section id="contact" class="contact">
        <h1>Contact Us</h1>

        <div class="contact-wrapper">

            <form id="ContactUs">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="First Name" required />
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Last Name" required />
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Email" required />
                <label for="tel">Phone number</label>
                <input type="number" id="tel" placeholder="Phone number" required />
                <button type="submit">Submit</button>
            </form>

            <div class="contact-info">
                <h3>Get in Touch</h3>
                <p><strong>Email:</strong> hello@maisonhues.com</p>
                <p><strong>Phone:</strong> +254 704 457 357</p>
                <p><strong>Location:</strong> Eldoret, Kenya</p>
                <a href="https://wa.me/254704457357" target="_blank" class="btn">Chat on WhatsApp</a>
            </div>

        </div>

        <div class="map-wrapper">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3989.6540639408927!2d35.278764273983434!3d0.5199046636833635!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6e12a08002718f4f%3A0xa91c4e3a9cf44afb!2sLancola%20Innovation%20Training%20Institute!5e0!3m2!1sen!2ske!4v1782488279385!5m2!1sen!2ske"
